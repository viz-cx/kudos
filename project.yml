name: Kudos
options:
  bundleIdPrefix: cx.viz
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  VIZ:
    url: https://github.com/viz-blockchain/viz-swift-lib
    branch: master
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: 4.0.0
  CodeScanner:
    url: https://github.com/twostraws/CodeScanner
    from: 2.0.0
  ConfettiSwiftUI:
    url: https://github.com/simibac/ConfettiSwiftUI
    from: 1.0.0

targets:
  Kudos:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Kudos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cx.viz.kudos
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Kudos/Info.plist
    dependencies:
      - package: VIZ
        product: VIZ
      - package: KeychainAccess
      - package: CodeScanner
      - package: ConfettiSwiftUI

  KudosTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - KudosTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: Kudos

  KudosUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - KudosUITests
    settings:
      base:
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: Kudos
